<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Mobile sidebar backdrop -->
<div id="sidebar-backdrop"></div>

<!-- Sidebar -->
<nav id="sidebar">
  <div class="sidebar-brand">My Dashboard</div>
  <div class="sidebar-nav">

    <div class="sidebar-section-label">Collections</div>
    <div class="nav-item" data-section="dimoo" data-nav="dimoo">
      <span>Dimoo Collection</span>
      <span class="nav-chevron">&#9654;</span>
    </div>
    <div class="sub-list" id="sub-dimoo"></div>

    <div class="sidebar-section-label" style="margin-top:8px">Reviews</div>
    <div class="nav-item" data-section="movies" data-nav="movies">
      <span>Movies</span>
      <span class="nav-chevron">&#9654;</span>
    </div>
    <div class="sub-list" id="sub-movies"></div>

    <div class="nav-item" data-section="restaurants" data-nav="restaurants">
      <span>Restaurants</span>
      <span class="nav-chevron">&#9654;</span>
    </div>
    <div class="sub-list" id="sub-restaurants"></div>

  </div>
</nav>

<!-- Topbar -->
<header id="topbar">
  <button id="hamburger" aria-label="Toggle menu">&#9776;</button>
  <nav id="breadcrumb"></nav>
</header>

<!-- Main content -->
<main id="main">

  <!-- ── Dimoo ── -->
  <section class="section" id="section-dimoo">
    <div class="stat-grid" id="d-stat-grid"></div>
    <div class="chart-grid" id="d-chart-grid"></div>
    <div class="table-card">
      <div class="table-header">
        <div class="table-title-row">
          <span class="table-title">Figurines</span>
          <span class="count-pill" id="d-count">0</span>
        </div>
        <div class="table-filters">
          <select id="d-filter-owned">
            <option value="">All Status</option>
            <option value="yes">Owned</option>
            <option value="no">Missing</option>
          </select>
          <input id="d-search" type="text" placeholder="Search&#8230;" style="width:160px">
        </div>
      </div>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th style="width:26%">Name</th>
              <th style="width:20%">Series</th>
              <th style="width:6%">#</th>
              <th style="width:10%">Status</th>
              <th style="width:12%">How</th>
              <th style="width:14%">Who / Source</th>
              <th style="width:12%">Date</th>
            </tr>
          </thead>
          <tbody id="d-tbody"></tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- ── Movies ── -->
  <section class="section" id="section-movies">
    <div class="stat-grid" id="m-stat-grid"></div>
    <div class="chart-grid" id="m-chart-grid"></div>
    <div class="table-card">
      <div class="table-header">
        <div class="table-title-row">
          <span class="table-title">Movies</span>
          <span class="count-pill" id="m-count">0</span>
        </div>
        <div class="table-filters">
          <input id="m-search" type="text" placeholder="Search&#8230;" style="width:160px">
        </div>
      </div>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th style="width:34%">Title</th>
              <th style="width:14%">Watch Date</th>
              <th style="width:10%">Rating</th>
              <th style="width:20%">Location</th>
              <th style="width:22%">Notes</th>
            </tr>
          </thead>
          <tbody id="m-tbody"></tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- ── Restaurants ── -->
  <section class="section" id="section-restaurants">
    <div class="stat-grid" id="r-stat-grid"></div>
    <div class="chart-grid" id="r-chart-grid"></div>
    <div class="table-card">
      <div class="table-header">
        <div class="table-title-row">
          <span class="table-title">Restaurants</span>
          <span class="count-pill" id="r-count">0</span>
        </div>
        <div class="table-filters">
          <select id="r-filter-return">
            <option value="">All</option>
            <option value="yes">Would Return</option>
            <option value="no">Would Not</option>
            <option value="maybe">Maybe</option>
          </select>
          <input id="r-search" type="text" placeholder="Search&#8230;" style="width:160px">
        </div>
      </div>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th style="width:22%">Name</th>
              <th style="width:13%">Date</th>
              <th style="width:12%">Location</th>
              <th style="width:11%">Return?</th>
              <th style="width:8%">Food</th>
              <th style="width:8%">Service</th>
              <th style="width:8%">Atmos.</th>
              <th style="width:8%">Value</th>
              <th style="width:10%">Overall</th>
            </tr>
          </thead>
          <tbody id="r-tbody"></tbody>
        </table>
      </div>
    </div>
  </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="js/app.js"></script>
<script src="js/dimoo.js"></script>
<script src="js/movies.js"></script>
<script src="js/restaurants.js"></script>
<script>init();</script>
</body>
</html>
